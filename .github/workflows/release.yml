name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Read package.json version
        id: version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "pkg_version=${PKG_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Compare tag with package.json version
        id: check
        run: |
          PKG_VERSION="v${{ steps.version.outputs.pkg_version }}"

          # Manual dispatch → always release (version might be unchanged)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch: forcing release for ${PKG_VERSION}."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "new_tag=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get latest tag (if any)
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)

          echo "Latest tag : ${LATEST_TAG:-none}"
          echo "Package ver : ${PKG_VERSION}"

          if [ "${LATEST_TAG}" = "${PKG_VERSION}" ]; then
            echo "Version already released, skipping."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected, will release ${PKG_VERSION}."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "new_tag=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Skip tag creation if it already exists (e.g. manual re-run)
          if git rev-parse "${{ steps.check.outputs.new_tag }}" >/dev/null 2>&1; then
            echo "Tag already exists, skipping tag creation."
          else
            git tag "${{ steps.check.outputs.new_tag }}"
            git push origin "${{ steps.check.outputs.new_tag }}"
          fi

      - name: Build
        if: steps.check.outputs.should_release == 'true'
        run: |
          npm ci
          npm run prod

      - name: Build plugins
        if: steps.check.outputs.should_release == 'true'
        run: |
          for plugin_dir in plugins/*/; do
            if [ -f "${plugin_dir}package.json" ]; then
              plugin_name=$(basename "$plugin_dir")
              echo "::group::Building plugin: ${plugin_name}"
              cd "$plugin_dir"
              npm ci
              npm run build
              cd "${{ github.workspace }}"
              echo "::endgroup::"
            fi
          done

      - name: Create Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.check.outputs.new_tag }}
          files: |
            dist/ArcaFeed.user.js
            plugins/*/dist/*.user.js
          generate_release_notes: true
